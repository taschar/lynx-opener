<!DOCTYPE html>
<html>
<head>
  <title>Lynx Opener Settings</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #3498db;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-color: #333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    h1 {
      color: var(--primary-color);
      margin-bottom: 1.5rem;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #666;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
      outline: none;
    }

    .help-text {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.5rem;
    }

    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s, transform 0.1s;
      width: 100%;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      transform: scale(0.98);
    }

    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      height: 1rem;
      color: #27ae60;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lynx Opener</h1>
    <div class="form-group">
      <label for="terminal">Terminal Command</label>
      <input type="text" id="terminal" placeholder="e.g., gnome-terminal, alacritty, kitty">
      <p class="help-text">The command used to launch your preferred terminal emulator.</p>
    </div>
    <div class="form-group checkbox-group">
      <label for="fullscreen">
        <input type="checkbox" id="fullscreen"> Open in Fullscreen
      </label>
      <p class="help-text">Try to launch the terminal window in fullscreen mode.</p>
    </div>
    <button id="save">Save Settings</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
